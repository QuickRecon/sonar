<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SonarMK2</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <div class="main-panel">
            <canvas id="sonar-canvas" width="800" height="800"></canvas>
        </div>
        <div class="control-panel">
            <h2>SonarMK2 <span id="conn-indicator" class="indicator disconnected"></span></h2>

            <div class="control-group">
                <label>Range (m)</label>
                <input type="range" id="range" min="1" max="50" value="5" step="1">
                <span id="range-val">5</span>
            </div>

            <div class="control-group">
                <label>Gain</label>
                <select id="gain">
                    <option value="0">Low (0)</option>
                    <option value="1" selected>Medium (1)</option>
                    <option value="2">High (2)</option>
                </select>
            </div>

            <div class="control-group">
                <label>Sector</label>
                <div class="radio-group" id="sector-select">
                    <label><input type="radio" name="sector" value="10"> 10&deg;</label>
                    <label><input type="radio" name="sector" value="25"> 25&deg;</label>
                    <label><input type="radio" name="sector" value="90"> 90&deg;</label>
                    <label><input type="radio" name="sector" value="120"> 120&deg;</label>
                    <label><input type="radio" name="sector" value="360" checked> 360&deg;</label>
                </div>
            </div>

            <div class="control-group">
                <label>Samples</label>
                <div class="radio-group" id="samples-select">
                    <label><input type="radio" name="samples" value="200"> 200</label>
                    <label><input type="radio" name="samples" value="500"> 500</label>
                    <label><input type="radio" name="samples" value="800"> 800</label>
                    <label><input type="radio" name="samples" value="1200" checked> 1200</label>
                </div>
            </div>

            <div class="control-group">
                <label>Water Type</label>
                <div class="radio-group" id="water-type">
                    <label><input type="radio" name="water" value="salt" checked> Salt</label>
                    <label><input type="radio" name="water" value="fresh"> Fresh</label>
                </div>
            </div>

            <div class="control-group param-display">
                <label>Speed of Sound</label>
                <span id="speed-of-sound" class="param-value">--</span>
                <label>TX Duration</label>
                <span id="tx-duration" class="param-value">--</span>
                <label>Sample Period</label>
                <span id="sample-period" class="param-value">--</span>
            </div>

            <div class="control-group">
                <label>Color Palette</label>
                <select id="palette">
                    <option value="grayscale">Grayscale</option>
                    <option value="ocean">Ocean</option>
                    <option value="turbo" selected>Turbo</option>
                    <option value="hot">Hot</option>
                </select>
            </div>

            <div class="control-group">
                <button id="test-pattern" type="button">Test Pattern</button>
            </div>

            <div class="control-group reset-buttons">
                <button id="reset-sonar" type="button">Reset Sonar</button>
                <button id="reset-controller" type="button">Reset Controller</button>
            </div>
        </div>
    </div>

    <div class="status-bar">
        <span>Depth: <b id="depth">--</b> m</span>
        <span>Battery: <b id="battery">--</b> V</span>
        <span>Scan: <b id="scan-rate">--</b> ang/s</span>
    </div>

    <script src="sonar.js"></script>
</body>
</html>
